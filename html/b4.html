<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Results</title>
</head>
<body>
    <h3 style="text-align: center;">Kết quả học tập</h3>

<table style="width:80%; text-align:center; border:2px solid gray;">
    <!-- Header -->

    <tr style="background:#d9d9d9; font-weight:bold;">
        <th rowspan="2" style="border:1px solid gray; padding:8px;">Họ tên</th>
        <th colspan="3" style="border:1px solid gray; padding:8px;">Môn học</th>
        <th rowspan="2" style="border:1px solid gray; padding:8px;">Kết quả</th>
    </tr>

    <tr style="background:#d9d9d9; font-weight:bold;">
        <th style="border:1px solid gray; padding:8px;">Toán</th>
        <th style="border:1px solid gray; padding:8px;">Văn</th>
        <th style="border:1px solid gray; padding:8px;">Ngoại ngữ</th>
    </tr>

    <!-- Student 1 -->
    <tr>
        <td style="border:1px solid gray; text-align:left; padding:8px;">
            Trần Văn Thành
        </td>
        <td style="border:1px solid gray;">8</td>
        <td style="border:1px solid gray;">5</td>
        <td style="border:1px solid gray;">7</td>
        <td style="border:1px solid gray; background:yellow;">Đạt</td>
    </tr>

    <!-- Student 2 -->
    <tr>
        <td style="border:1px solid gray; text-align:left; padding:8px;">
            Lê Thanh Sơn
        </td>
        <td style="border:1px solid gray;">4</td>
        <td style="border:1px solid gray;">9</td>
        <td style="border:1px solid gray;">6</td>
        <td style="border:1px solid gray; background:red; color:white;">
            Không đạt
        </td>
    </tr>

    <!-- Student 3 -->
    <tr>
        <td style="border:1px solid gray; text-align:left; padding:8px;">
            Nguyễn Thị Tuyết
        </td>
        <td style="border:1px solid gray;">8</td>
        <td style="border:1px solid gray;">9</td>
        <td style="border:1px solid gray;">5</td>
        <td style="border:1px solid gray; background:yellow;">Đạt</td>
    </tr>

    <!-- Footer -->
    <tr>
        <td colspan="4" style="border:1px solid gray; text-align:left; padding:8px; font-weight:bold;">
            Tổng số học sinh đạt
        </td>
        <td style="border:1px solid gray;">2</td>
    </tr>
    
</table>
<a href="../web.html">Về mục lục</a>
</body>
</html>
